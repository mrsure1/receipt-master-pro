
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Master Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script>
      /**
       * Service Worker Registration Logic
       * 샌드박스 환경(Google AI Studio 등)에서 발생할 수 있는 Origin 불일치 및 URL 오류를 방지하기 위해 
       * 안전한 방식(try-catch 및 프로토콜 확인)으로 등록을 진행합니다.
       */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          try {
            // 현재 페이지가 안전한 컨텍스트(https 또는 localhost)이고 HTTP 프로토콜인지 확인
            // 일부 샌드박스 환경에서는 protocol이 'about:' 등이 될 수 있어 URL 생성 실패 원인이 됨
            const isSecureContext = window.isSecureContext || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const isHttp = window.location.protocol.startsWith('http');
            
            if (isSecureContext && isHttp) {
              // sw.js 경로를 현재 페이지의 절대 경로 기준으로 계산
              const swUrl = new URL('sw.js', window.location.href).href;
              
              // 등록하려는 스크립트의 origin이 현재 페이지의 origin과 같은지 확인
              if (new URL(swUrl).origin === window.location.origin) {
                navigator.serviceWorker.register(swUrl)
                  .then(registration => {
                    console.log('ServiceWorker 등록 성공:', registration.scope);
                  })
                  .catch(error => {
                    // 등록 실패는 앱 동작에 치명적이지 않으므로 경고만 출력
                    console.warn('ServiceWorker 등록 실패:', error.message);
                  });
              }
            }
          } catch (e) {
            console.warn('ServiceWorker 등록 로직 건너뜀 (환경 호환성):', e);
          }
        });
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
